<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuioNet — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-body d-flex align-items-center justify-content-center">
<div class="login-card">
  <div class="text-center mb-4">
    <div class="login-logo mb-3">
      <i class="bi bi-diagram-3-fill"></i>
    </div>
    <h2 class="fw-bold">Buio<span class="text-info">Net</span></h2>
    <p class="text-muted small">Network Intelligence Platform</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post">
    <div class="mb-3">
      <label class="form-label text-muted small">Username</label>
      <div class="input-group">
        <span class="input-group-text bg-dark border-secondary"><i class="bi bi-person-fill text-muted"></i></span>
        <input type="text" name="username" class="form-control bg-dark border-secondary text-white"
               placeholder="admin" autofocus required>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label text-muted small">Password</label>
      <div class="input-group">
        <span class="input-group-text bg-dark border-secondary"><i class="bi bi-lock-fill text-muted"></i></span>
        <input type="password" name="password" class="form-control bg-dark border-secondary text-white"
               placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn btn-info w-100 fw-semibold">Sign In</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
